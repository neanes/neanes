---
name: CI

on:
  push:
    branches:
      - master
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'

      - name: Enable Corepack
        run: corepack enable npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Lint
        run: npm run lint

      - name: Build Windows and Linux
        if: runner.os != 'macOS'
        run: npm run build

      - name: Build macOS
        if: runner.os == 'macOS'
        run: npm run build -- --x64 && npm run build -- --arm64

      - name: Publish
        uses: actions/upload-artifact@v7
        with:
          name: Neanes-${{ matrix.os }}
          path: dist/Neanes*
          retention-days: 3
