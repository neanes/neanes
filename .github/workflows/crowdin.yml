---
name: Crowdin

on:
  push:
    branches:
      - master
  schedule:
    # Pull new translations every day at 06:00 UTC.
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

# Avoid two syncs racing on the localization branch (e.g. a push that
# overlaps the scheduled run).
concurrency:
  group: crowdin
  cancel-in-progress: false

jobs:
  upload-to-crowdin:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v7.0.1

      - name: Upload translations to Crowdin
        uses: crowdin/github-action@v2.16.4
        with:
          upload_sources: true
          upload_sources_args: '--delete-obsolete'
          upload_translations: true
          auto_approve_imported: true
          import_eq_suggestions: true
          download_translations: false
          create_pull_request: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}

  download-from-crowdin:
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v7.0.1

      - name: Download approved translations from Crowdin
        uses: crowdin/github-action@v2.16.4
        with:
          upload_sources: false
          upload_translations: false
          download_translations: true
          export_only_approved: true
          skip_untranslated_files: true
          localization_branch_name: l10n_crowdin
          create_pull_request: true
          pull_request_title: 'chore: New Crowdin translations'
          pull_request_labels: skip-changelog
          pull_request_base_branch_name: master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}
