---
name: Publish Web

on: workflow_dispatch

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'

      - name: Enable Corepack
        run: corepack enable npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Lint
        run: npm run lint

      - name: Build for web
        run: npm run web:build -- --base=/neanes-web-app/

      - name: Push
        run: |
          cd dist
          git config --global user.email "4132779+danielgarthur@users.noreply.github.com"
          git config --global user.name "danielgarthur"
          git init -b master
          git add -A
          git commit -m "Deploy"
          git push -f https://danielgarthur:${{secrets.PAT}}@github.com/neanes/neanes-web-app master:gh-pages
