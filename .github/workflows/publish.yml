---
name: Publish

on: workflow_dispatch

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Check out
        uses: actions/checkout@v6.0.3

      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: 'npm'

      - name: Enable Corepack
        run: corepack enable npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Lint
        run: npm run lint

      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@v23.2.0

      - name: Build Windows
        if: runner.os == 'Windows'
        run: npm run release -- --win
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Build Linux
        if: runner.os == 'Linux'
        run: npm run release -- --linux --x64 --arm64
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Build macOS
        if: runner.os == 'macOS'
        run: npm run release -- --mac --x64 --arm64
        env:
          GH_TOKEN: ${{ github.token }}
