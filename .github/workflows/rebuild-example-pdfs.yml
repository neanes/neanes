---
name: Rebuild Example PDFs

on: workflow_dispatch

permissions:
  contents: read

jobs:
  rebuild-example-pdfs:
    runs-on: ubuntu-latest
    env:
      DISPLAY: ':99.0'
      APPIMAGE_EXTRACT_AND_RUN: 1
    steps:
      - name: Check out
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Start Xvfb
        run: Xvfb :99 -screen 0 1024x768x24 > /dev/null 2>&1 &

      - name: Get the latest AppImage
        run: gh release download --repo neanes/neanes --pattern '*AppImage*' --output neanes-cli
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Make AppImage Executable
        run: chmod +x neanes-cli

      - name: Generate PDFs
        run: find ./examples -type f -name '*.byzx' -print0 | xargs -0 ./neanes-cli --no-sandbox --silent-pdf

      - name: Archive PDFs
        uses: actions/upload-artifact@v7
        with:
          name: PDFs
          path: examples/*.pdf
